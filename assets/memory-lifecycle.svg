<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Agent 记忆生命周期</text>

  <!-- Column headers -->
  <rect x="30" y="55" width="220" height="32" rx="6" fill="#1e40af" opacity="0.1"/>
  <text x="140" y="76" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">第一次会话</text>

  <rect x="340" y="55" width="220" height="32" rx="6" fill="#065f46" opacity="0.1"/>
  <text x="450" y="76" text-anchor="middle" font-size="14" font-weight="600" fill="#065f46">数据存储</text>

  <rect x="650" y="55" width="220" height="32" rx="6" fill="#7c2d12" opacity="0.1"/>
  <text x="760" y="76" text-anchor="middle" font-size="14" font-weight="600" fill="#7c2d12">第二次会话</text>

  <!-- Session 1 items -->
  <rect x="30" y="110" width="220" height="44" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="140" y="137" text-anchor="middle" font-size="13" fill="#1e40af">用户输入</text>

  <rect x="30" y="180" width="220" height="44" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="140" y="198" text-anchor="middle" font-size="12" fill="#1e40af">"我喜欢用中文回答问题"</text>
  <text x="140" y="214" text-anchor="middle" font-size="11" fill="#64748b">请记住这个偏好</text>

  <!-- Arrow down session1 -->
  <line x1="140" y1="230" x2="140" y2="265" stroke="#555" marker-end="url(#arrow)"/>

  <rect x="30" y="270" width="220" height="56" rx="8" fill="#bfdbfe" stroke="#60a5fa" stroke-width="1"/>
  <text x="140" y="293" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">LLM 判断需要记忆</text>
  <text x="140" y="313" text-anchor="middle" font-size="11" fill="#334155">调用 save_memory()</text>

  <!-- Arrow: save_memory → storage -->
  <path d="M250,298 Q300,298 340,298" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="295" y="288" text-anchor="middle" font-size="10" fill="#3b82f6" font-weight="600">写入</text>

  <!-- Session 1 reply -->
  <rect x="30" y="350" width="220" height="44" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="140" y="377" text-anchor="middle" font-size="12" fill="#1e40af">回复: "好的，已记住"</text>

  <rect x="30" y="420" width="220" height="36" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="140" y="443" text-anchor="middle" font-size="12" fill="#64748b">会话结束</text>

  <!-- Storage items -->
  <rect x="340" y="268" width="220" height="80" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="450" y="293" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">long_term.json</text>
  <text x="450" y="313" text-anchor="middle" font-size="10" fill="#064e3b">key: "language_preference"</text>
  <text x="450" y="330" text-anchor="middle" font-size="10" fill="#064e3b">value: "喜欢中文"</text>

  <!-- Arrow: storage → session2 -->
  <path d="M560,308 Q610,308 650,308" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="605" y="298" text-anchor="middle" font-size="10" fill="#3b82f6" font-weight="600">加载</text>

  <!-- Session 2 items -->
  <rect x="650" y="115" width="220" height="42" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="760" y="141" text-anchor="middle" font-size="12" fill="#7c2d12">启动 → 加载记忆</text>

  <rect x="650" y="180" width="220" height="42" rx="8" fill="#ffedd5" stroke="#fdba74" stroke-width="1"/>
  <text x="760" y="206" text-anchor="middle" font-size="12" fill="#7c2d12">注入 system prompt</text>

  <rect x="650" y="245" width="220" height="42" rx="8" fill="#fed7aa" stroke="#fb923c" stroke-width="1.5"/>
  <text x="760" y="271" text-anchor="middle" font-size="11" fill="#7c2d12">"当前记忆: 用户喜欢中文"</text>

  <rect x="650" y="315" width="220" height="44" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="760" y="339" text-anchor="middle" font-size="12" fill="#7c2d12">用户输入: "统计代码行数"</text>

  <rect x="650" y="385" width="220" height="44" rx="8" fill="#fdba74" stroke="#ea580c" stroke-width="1.5"/>
  <text x="760" y="405" text-anchor="middle" font-size="11" fill="#7c2d12">LLM 用中文回复 (记得!)</text>
  <text x="760" y="420" text-anchor="middle" font-size="10" fill="#7c2d12">"共有357行代码"</text>

  <!-- Bottom timeline arrow -->
  <line x1="140" y1="465" x2="760" y2="465" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="760,462 770,465 760,468" fill="#cbd5e1"/>
  <text x="450" y="495" text-anchor="middle" font-size="12" fill="#94a3b8" font-weight="500">时间</text>
</svg>