<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="system-ui, sans-serif" font-size="14">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- User box -->
  <rect x="150" y="20" width="300" height="60" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="48" text-anchor="middle" font-weight="600" fill="#1e40af" font-size="16">用 户</text>
  <text x="300" y="68" text-anchor="middle" fill="#3b82f6" font-size="13">输入任务：读文件、执行命令…</text>

  <!-- Arrow down from user -->
  <line x1="300" y1="80" x2="300" y2="120" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Agent loop box -->
  <rect x="50" y="120" width="500" height="190" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="148" text-anchor="middle" font-weight="700" fill="#166534" font-size="16">Agent 主循环</text>

  <!-- Steps inside loop -->
  <g font-size="13" fill="#374151">
    <text x="90" y="178"><tspan font-weight="600" fill="#059669">1.</tspan> 把对话历史 + 任务发给 LLM</text>
    <text x="90" y="203"><tspan font-weight="600" fill="#059669">2.</tspan> LLM 说："我需要用 XX 工具"</text>
    <text x="90" y="228"><tspan font-weight="600" fill="#059669">3.</tspan> Agent 执行这个工具</text>
    <text x="90" y="253"><tspan font-weight="600" fill="#059669">4.</tspan> 把执行结果告诉 LLM</text>
    <text x="90" y="278"><tspan font-weight="600" fill="#059669">5.</tspan> 回到第1步，或 LLM 给出最终答案</text>
  </g>

  <!-- Three arrows down to tools -->
  <line x1="180" y1="310" x2="180" y2="350" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="300" y1="310" x2="300" y2="350" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="420" y1="310" x2="420" y2="350" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Three tool boxes -->
  <rect x="100" y="350" width="160" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="372" text-anchor="middle" font-weight="600" fill="#92400e">读 取 文 件</text>
  <text x="180" y="390" text-anchor="middle" fill="#b45309" font-size="12">(read)</text>

  <rect x="220" y="350" width="160" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="372" text-anchor="middle" font-weight="600" fill="#92400e">写 入 文 件</text>
  <text x="300" y="390" text-anchor="middle" fill="#b45309" font-size="12">(write)</text>

  <rect x="340" y="350" width="160" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="420" y="372" text-anchor="middle" font-weight="600" fill="#92400e">执 行 命 令</text>
  <text x="420" y="390" text-anchor="middle" fill="#b45309" font-size="12">(bash)</text>
</svg>