<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 560" font-family="system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#475569"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#3b82f6"/>
    </marker>
    <filter id="s" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="310" y="32" text-anchor="middle" font-weight="700" font-size="15" fill="#1e293b">Agent 主循环（无记忆版）</text>

  <!-- ===== Left side: User ===== -->
  <rect x="20" y="60" width="120" height="46" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#s)"/>
  <text x="80" y="88" text-anchor="middle" font-weight="600" fill="#1d4ed8">用 户</text>

  <!-- ===== Right side: LLM ===== -->
  <rect x="470" y="248" width="130" height="46" rx="8" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5" filter="url(#s)"/>
  <text x="535" y="276" text-anchor="middle" font-weight="600" fill="#7c3aed">LLM</text>

  <!-- ===== Center: messages box ===== -->
  <rect x="210" y="248" width="130" height="46" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5" filter="url(#s)"/>
  <text x="275" y="268" text-anchor="middle" font-weight="600" fill="#a16207">messages</text>
  <text x="275" y="284" text-anchor="middle" fill="#a16207" font-size="11">（内存 · 对话历史）</text>

  <!-- ===== Bottom: Tools ===== -->
  <rect x="200" y="420" width="300" height="55" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#s)"/>
  <text x="350" y="442" text-anchor="middle" font-weight="600" fill="#166534">工 具 层</text>
  <text x="350" y="462" text-anchor="middle" fill="#15803d" font-size="11">execute_bash · read_file · write_file</text>

  <!-- ===== Arrows ===== -->
  <!-- User → messages -->
  <line x1="140" y1="83" x2="210" y2="260" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)" stroke-dasharray="4,3"/>
  <text x="160" y="175" fill="#475569" font-size="10">用户消息</text>

  <!-- messages → LLM -->
  <line x1="340" y1="271" x2="470" y2="271" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="405" y="262" text-anchor="middle" fill="#3b82f6" font-size="10">发送 messages</text>

  <!-- LLM → messages -->
  <line x1="470" y1="285" x2="340" y2="285" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="405" y="300" text-anchor="middle" fill="#3b82f6" font-size="10">LLM 回复 + tool_calls</text>

  <!-- messages → Tools -->
  <line x1="275" y1="294" x2="310" y2="420" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="270" y="365" fill="#475569" font-size="10">执行工具</text>

  <!-- Tools → messages -->
  <line x1="390" y1="420" x2="320" y2="294" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="410" y="365" fill="#475569" font-size="10">工具结果</text>

  <!-- ===== Annotations ===== -->
  <!-- No memory warning -->
  <g transform="translate(20, 500)">
    <rect x="0" y="0" width="580" height="45" rx="6" fill="#fef2f2" stroke="#f87171" stroke-width="1"/>
    <text x="290" y="18" text-anchor="middle" fill="#991b1b" font-weight="600" font-size="12">⚠ 每次启动 messages 从零开始 — 跨会话失忆</text>
    <text x="290" y="36" text-anchor="middle" fill="#991b1b" font-size="11">messages 无限增长 → 超出上下文窗口 → 会话内失忆</text>
  </g>
</svg>
