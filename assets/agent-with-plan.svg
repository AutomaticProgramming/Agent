<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 600" font-family="PingFang SC, sans-serif" font-size="14">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- User box -->
  <rect x="170" y="20" width="340" height="65" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="340" y="48" text-anchor="middle" font-weight="700" fill="#1e40af" font-size="16">用 户</text>
  <text x="340" y="70" text-anchor="middle" fill="#3b82f6" font-size="13">输入任务描述</text>

  <line x1="340" y1="85" x2="340" y2="115" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 1: Plan -->
  <rect x="50" y="115" width="580" height="120" rx="12" fill="#fdf4ff" stroke="#a855f7" stroke-width="2" filter="url(#shadow)"/>
  <text x="340" y="143" text-anchor="middle" font-weight="700" fill="#9333ea" font-size="16">Phase 1：LLM 生成计划</text>

  <rect x="100" y="160" width="200" height="55" rx="8" fill="#faf5ff" stroke="#c084fc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="200" y="185" text-anchor="middle" font-weight="600" fill="#7c3aed" font-size="13">LLM 接收任务</text>
  <text x="200" y="205" text-anchor="middle" fill="#9333ea" font-size="12">生成可执行步骤</text>

  <line x1="310" y1="187" x2="380" y2="187" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="390" y="160" width="200" height="55" rx="8" fill="#faf5ff" stroke="#c084fc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="490" y="185" text-anchor="middle" font-weight="600" fill="#7c3aed" font-size="13">输出执行计划</text>
  <text x="490" y="205" text-anchor="middle" fill="#9333ea" font-size="12">Step 1 / Step 2 / Step 3…</text>

  <line x1="340" y1="235" x2="340" y2="268" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 2: Confirm -->
  <rect x="50" y="268" width="580" height="100" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="340" y="296" text-anchor="middle" font-weight="700" fill="#ea580c" font-size="16">Phase 2：用户确认 / 修改</text>

  <!-- Three options -->
  <rect x="100" y="310" width="140" height="40" rx="8" fill="#d4edda" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="335" text-anchor="middle" font-weight="600" fill="#166534" font-size="14">yes → 执行</text>

  <rect x="270" y="310" width="140" height="40" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="340" y="335" text-anchor="middle" font-weight="600" fill="#991b1b" font-size="14">no → 取消</text>

  <rect x="440" y="310" width="140" height="40" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="510" y="335" text-anchor="middle" font-weight="600" fill="#3730a3" font-size="14">edit → 修改</text>

  <line x1="340" y1="368" x2="340" y2="400" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="360" y="390" fill="#16a34a" font-size="12" font-weight="600">yes</text>

  <!-- Phase 3: Execute -->
  <rect x="50" y="400" width="580" height="180" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="340" y="428" text-anchor="middle" font-weight="700" fill="#166534" font-size="16">Phase 3：按计划执行</text>

  <g font-size="13" fill="#374151">
    <text x="90" y="458"><tspan font-weight="600" fill="#059669">1.</tspan> 将计划注入 messages，发给 LLM</text>
    <text x="90" y="483"><tspan font-weight="600" fill="#059669">2.</tspan> LLM 按步骤调用工具</text>
    <text x="90" y="508"><tspan font-weight="600" fill="#059669">3.</tspan> Agent 执行工具，返回结果</text>
    <text x="90" y="533"><tspan font-weight="600" fill="#059669">4.</tspan> LLM 根据结果决定下一步</text>
    <text x="90" y="558"><tspan font-weight="600" fill="#059669">5.</tspan> 任务完成，返回最终答案</text>
  </g>
</svg>
