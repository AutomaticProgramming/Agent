<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 520" font-family="system-ui, sans-serif" font-size="14">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <filter id="shadow2" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- User Input -->
  <rect x="160" y="10" width="300" height="44" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" filter="url(#shadow2)"/>
  <text x="310" y="37" text-anchor="middle" font-weight="600" fill="#5b21b6">📝 用户输入："读一下 agent.py 有多少行"</text>

  <line x1="310" y1="54" x2="310" y2="80" stroke="#334155" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Round 1 Box -->
  <rect x="40" y="80" width="540" height="180" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="310" y="104" text-anchor="middle" font-weight="700" fill="#1d4ed8" font-size="15">第 1 轮 — 调用 LLM</text>

  <!-- Messages box inside round 1 -->
  <rect x="80" y="116" width="460" height="44" rx="6" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="310" y="143" text-anchor="middle" fill="#1e40af">messages: { 任务: "读 agent.py 的行数" }</text>

  <line x1="310" y1="160" x2="310" y2="185" stroke="#334155" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- LLM decision -->
  <rect x="80" y="185" width="460" height="40" rx="6" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="310" y="210" text-anchor="middle" fill="#1e40af">LLM 决策：调用 read_file，path = agent.py</text>

  <line x1="310" y1="225" x2="310" y2="250" stroke="#334155" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Action -->
  <rect x="80" y="250" width="460" height="36" rx="6" fill="#dcfce7" stroke="#86efac"/>
  <text x="310" y="273" text-anchor="middle" fill="#166534">🔧 Agent 读取 agent.py，拿到文件内容 → 存回 messages</text>

  <line x1="310" y1="260" x2="310" y2="300" stroke="#334155" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Round 2 Box -->
  <rect x="40" y="300" width="540" height="170" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="310" y="324" text-anchor="middle" font-weight="700" fill="#a16207" font-size="15">第 2 轮 — 调用 LLM</text>

  <!-- Messages box inside round 2 -->
  <rect x="80" y="336" width="460" height="44" rx="6" fill="#fef9c3" stroke="#fde047"/>
  <text x="310" y="354" text-anchor="middle" fill="#854d0e">messages: { agent.py 的内容 + "统计行数" }</text>
  <text x="310" y="370" text-anchor="middle" fill="#854d0e" font-size="12">← LLM 看到了文件内容</text>

  <line x1="310" y1="380" x2="310" y2="405" stroke="#334155" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- LLM decision -->
  <rect x="80" y="405" width="460" height="40" rx="6" fill="#fef9c3" stroke="#fde047"/>
  <text x="310" y="430" text-anchor="middle" fill="#854d0e">LLM 决策：不需要工具，直接回答 → "这个文件有 105 行"</text>

  <line x1="310" y1="445" x2="310" y2="470" stroke="#334155" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Final result -->
  <rect x="160" y="470" width="300" height="44" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2" filter="url(#shadow2)"/>
  <text x="310" y="497" text-anchor="middle" font-weight="700" fill="#15803d">✅ 返回给用："这个文件有 105 行"</text>
</svg>